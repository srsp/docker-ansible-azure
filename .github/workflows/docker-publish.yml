name: Docker Publish

on:
  push:
    branches:
      - 'main'
    tags:
      - 'v*'
  pull_request:
    branches:
      - 'main'
  repository_dispatch:
    types:
      - tag-publish

env:
  IMAGE_NAME: ansible-azure
  REGISTRY_USER: srsp

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - 
        name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.client_payload.tag || github.ref }}
      -
        name: Resolve publish context
        id: context
        run: |
          is_version_tag=false
          version_tag=""

          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            version_tag="${{ github.event.client_payload.tag }}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            version_tag="${{ github.ref_name }}"
          fi

          if [[ "$version_tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            is_version_tag=true
          else
            version_tag=""
          fi

          echo "is_version_tag=$is_version_tag" >> "$GITHUB_OUTPUT"
          echo "version_tag=$version_tag" >> "$GITHUB_OUTPUT"
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login against a Docker registry
      # https://github.com/docker/login-action
      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.REGISTRY_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # Extract metadata (tags, labels) for Docker
      # https://github.com/docker/metadata-action
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_USER }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch,enable=${{ steps.context.outputs.is_version_tag != 'true' && github.event_name != 'pull_request' }}
            type=ref,event=pr,enable=${{ github.event_name == 'pull_request' }}
            type=semver,pattern={{version}},value=${{ steps.context.outputs.version_tag }},enable=${{ steps.context.outputs.is_version_tag == 'true' }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.context.outputs.version_tag }},enable=${{ steps.context.outputs.is_version_tag == 'true' }}

      # Build and push Docker image with Buildx
      # https://github.com/docker/build-push-action
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}          
